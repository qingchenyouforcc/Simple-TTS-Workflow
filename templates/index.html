<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simple TTS Workflow</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="intro">
        <div>
          <h1>Simple TTS Workflow</h1>
          <p>用 VoxCPM2 克隆音色并控制语气，或继续使用 Qwen3-TTS 工作流。</p>
        </div>
        <span class="status">VoxCPM2 + Qwen3-TTS</span>
      </section>

      <form id="tts-form" class="workspace">
        <section class="panel">
          <h2>生成模式</h2>
          <label>
            <span>模式</span>
            <select id="mode-select" name="mode">
              <optgroup label="VoxCPM2">
                <option value="vox_controllable_clone" selected>可控克隆</option>
                <option value="vox_design">语音设计</option>
                <option value="vox_hifi_clone">Hi-Fi 克隆（高级）</option>
              </optgroup>
              <optgroup label="Qwen3-TTS">
                <option value="clone">参考音频克隆</option>
                <option value="voice_design">语气设计</option>
                <option value="voice_design_then_clone">设计后复用</option>
              </optgroup>
            </select>
          </label>
          <p id="mode-note" class="note"></p>

          <div data-mode-group="reference_audio">
            <h2>参考素材</h2>
            <label data-mode-group="voice_preset">
              <span>语音预设</span>
              <select id="voice-preset-select" name="voice_preset">
                <option value="">不使用预设</option>
              </select>
            </label>
            <p id="voice-preset-note" class="note" data-mode-group="voice_preset"></p>
            <label>
              <span>参考音频</span>
              <input
                name="ref_audio"
                type="file"
                accept="audio/*"
                data-required-when="vox_controllable_clone vox_hifi_clone clone"
              />
            </label>
          </div>
          <div data-mode-group="reference_text">
            <label>
              <span>参考文本</span>
              <textarea
                name="ref_text"
                rows="5"
                placeholder="输入参考音频中实际说出的内容"
                data-required-when="vox_hifi_clone clone"
              ></textarea>
            </label>
          </div>

          <div data-mode-group="style">
            <label>
              <span>情绪/语气描述</span>
              <textarea
                name="emotion_instruction"
                rows="5"
                placeholder="例如：用稍微伤感、放慢语速、轻声克制的语气说"
                data-required-when="voice_design voice_design_then_clone"
              ></textarea>
            </label>
            <label data-mode-group="voice_design_then_clone">
              <span>设计参考文本</span>
              <textarea
                name="design_ref_text"
                rows="4"
                placeholder="这段文本会先用语气描述生成参考音频，再复用它生成下面的目标文本"
                data-required-when="voice_design_then_clone"
              >今天的天气有点安静，我想用这样的声音慢慢说完这段话。</textarea>
            </label>
          </div>

          <div data-mode-group="vox_params">
            <h2>Vox 参数</h2>
            <div class="field-row">
              <label>
                <span>CFG</span>
                <input name="cfg_value" type="number" min="1" max="3" step="0.1" value="2.0" />
              </label>
              <label>
                <span>步数</span>
                <input name="inference_timesteps" type="number" min="4" max="30" step="1" value="10" />
              </label>
            </div>
            <div class="toggle-row">
              <label class="check">
                <input name="normalize" type="checkbox" value="true" />
                <span>文本规范化</span>
              </label>
              <label class="check">
                <input name="denoise" type="checkbox" value="true" />
                <span>参考音频降噪</span>
              </label>
            </div>
          </div>
        </section>

        <section class="panel">
          <h2>生成文本</h2>
          <label>
            <span>目标文本（一行生成一个音频）</span>
            <textarea
              name="texts"
              rows="9"
              placeholder="第一句要生成的内容&#10;第二句要生成的内容"
              required
            ></textarea>
          </label>
          <div class="field-row">
            <label>
              <span>语言</span>
              <select name="language">
                <option value="Auto" selected>Auto</option>
                <option value="Chinese">Chinese</option>
                <option value="English">English</option>
                <option value="Japanese">Japanese</option>
                <option value="Korean">Korean</option>
                <option value="German">German</option>
                <option value="French">French</option>
                <option value="Russian">Russian</option>
                <option value="Portuguese">Portuguese</option>
                <option value="Spanish">Spanish</option>
                <option value="Italian">Italian</option>
              </select>
            </label>
          </div>
          <button id="submit-button" type="submit">开始生成</button>
        </section>
      </form>

      <section class="results" aria-live="polite">
        <div class="results-header">
          <h2>生成结果</h2>
          <p id="message">还没有生成内容。</p>
        </div>
        <div id="result-list" class="result-list"></div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
